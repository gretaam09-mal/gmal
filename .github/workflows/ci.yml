name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # conftest.py defaults to this exact URL if unset — set explicitly
      # anyway so it's obvious what the backend job depends on.
      PROVISION_DATABASE_URL: postgresql+psycopg://provision:provision@localhost:5432/provision_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pipx install poetry

      - name: Install dependencies
        run: poetry install --no-root

      - name: Create app role, test database, and pgvector extension
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -c \
            "CREATE ROLE provision LOGIN PASSWORD 'provision';"
          PGPASSWORD=postgres psql -h localhost -U postgres -c \
            "CREATE DATABASE provision_test OWNER provision;"
          PGPASSWORD=postgres psql -h localhost -U postgres -d provision_test -c \
            "CREATE EXTENSION IF NOT EXISTS vector;"
          PGPASSWORD=postgres psql -h localhost -U postgres -d provision_test -c \
            "GRANT ALL ON SCHEMA public TO provision;"

      - name: Lint
        run: poetry run ruff check .

      - name: Unit and integration tests
        run: poetry run pytest

  frontend-unit:
    name: Frontend (typecheck, lint, Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

  frontend-e2e:
    name: Frontend (Playwright smoke)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Smoke test
        run: pnpm test:e2e
        env:
          CI: true

  golden-set:
    name: Golden set
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pipx install poetry

      - name: Install backend dependencies
        # The runner imports services.extraction.schemas (see
        # ai/eval/run_golden_set.py) to validate each case against the
        # real ExtractedObligation schema — not a stub.
        working-directory: backend
        run: poetry install --no-root

      - name: Run golden-set regression runner
        working-directory: backend
        run: poetry run python3 ../ai/eval/run_golden_set.py
